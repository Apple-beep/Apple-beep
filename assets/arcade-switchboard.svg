<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 220" role="img" aria-label="Arcade switchboard">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09050f"/>
      <stop offset="55%" stop-color="#1a0d27"/>
      <stop offset="100%" stop-color="#10182a"/>
    </linearGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="220" rx="16" fill="url(#bg)"/>

  <g transform="translate(84 48)">
    <rect width="180" height="120" rx="16" fill="#0f172a" stroke="#334155"/>
    <circle cx="52" cy="60" r="22" fill="#22d3ee" filter="url(#soft)">
      <animate attributeName="r" values="20;24;20" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="118" cy="42" r="10" fill="#f97316"/>
    <circle cx="142" cy="76" r="10" fill="#a78bfa"/>
    <circle cx="100" cy="88" r="10" fill="#34d399"/>
  </g>

  <g font-family="'JetBrains Mono', monospace" fill="#e2e8f0">
    <text x="310" y="82" font-size="15" fill="#67e8f9">ARCADE SWITCHBOARD</text>
    <text x="310" y="122" font-size="33" font-weight="700">Vibe Mode Games</text>
    <text x="310" y="155" font-size="18" fill="#cbd5e1">Latency Lab + Incident Commander</text>
    <text x="310" y="180" font-size="14" fill="#94a3b8">Practice systems thinking and production tradeoff instincts</text>
  </g>

  <g transform="translate(975 74)" filter="url(#soft)">
    <rect x="0" y="0" width="210" height="16" rx="8" fill="#1e293b"/>
    <rect x="0" y="0" width="168" height="16" rx="8" fill="#22d3ee">
      <animate attributeName="width" values="40;190;100;168" dur="4s" repeatCount="indefinite"/>
    </rect>
    <text x="0" y="-12" font-family="'JetBrains Mono', monospace" font-size="12" fill="#67e8f9">ENGINEERING REFLEX</text>
  </g>
</svg>
