<svg width="1200" height="380" viewBox="0 0 1200 380" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1200" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#04101F"/>
      <stop offset="0.55" stop-color="#071A31"/>
      <stop offset="1" stop-color="#031325"/>
    </linearGradient>
    <linearGradient id="heroGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#28D7FF"/>
      <stop offset="0.5" stop-color="#56F5CF"/>
      <stop offset="1" stop-color="#2E7BFF"/>
    </linearGradient>
    <linearGradient id="lineA" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#28D7FF" stop-opacity="0.1"/>
      <stop offset="0.35" stop-color="#28D7FF" stop-opacity="0.8"/>
      <stop offset="0.7" stop-color="#56F5CF" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#56F5CF" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="lineB" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7C9BFF" stop-opacity="0.1"/>
      <stop offset="0.5" stop-color="#7C9BFF" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#28D7FF" stop-opacity="0.1"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#0F2C4D" stroke-opacity="0.45" stroke-width="1"/>
    </pattern>
    <filter id="blurGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .track { stroke-dasharray: 8 10; animation: dash 14s linear infinite; }
      .pulseA { animation: pulseA 2.8s ease-in-out infinite; transform-origin: center; }
      .pulseB { animation: pulseB 2.2s ease-in-out infinite; transform-origin: center; }
      .float { animation: float 7s ease-in-out infinite; }
      @keyframes dash {
        to { stroke-dashoffset: -360; }
      }
      @keyframes pulseA {
        0%,100% { opacity: 0.7; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.25); }
      }
      @keyframes pulseB {
        0%,100% { opacity: 0.6; transform: scale(0.9); }
        50% { opacity: 1; transform: scale(1.2); }
      }
      @keyframes float {
        0%,100% { transform: translateY(0px); }
        50% { transform: translateY(-5px); }
      }
    </style>
  </defs>

  <rect width="1200" height="380" rx="24" fill="url(#heroBg)"/>
  <rect width="1200" height="380" rx="24" fill="url(#grid)"/>

  <circle cx="285" cy="94" r="200" fill="#28D7FF" opacity="0.12" filter="url(#blurGlow)"/>
  <circle cx="990" cy="316" r="220" fill="#56F5CF" opacity="0.1" filter="url(#blurGlow)"/>

  <g class="float" opacity="0.95">
    <path class="track" d="M40 270C140 215 226 311 321 250C390 206 435 130 505 128C580 126 635 246 707 247C794 248 820 140 902 140C972 141 1017 215 1160 180" stroke="url(#lineA)" stroke-width="3" fill="none"/>
    <path class="track" d="M40 318C166 274 249 365 378 316C489 274 533 171 645 171C743 171 813 265 910 266C1001 267 1068 180 1160 228" stroke="url(#lineB)" stroke-width="2.5" fill="none"/>
  </g>

  <g filter="url(#blurGlow)">
    <circle class="pulseA" cx="321" cy="250" r="5" fill="#28D7FF"/>
    <circle class="pulseB" cx="505" cy="128" r="5" fill="#56F5CF"/>
    <circle class="pulseA" cx="707" cy="247" r="5" fill="#7C9BFF"/>
    <circle class="pulseB" cx="902" cy="140" r="5" fill="#56F5CF"/>
    <circle class="pulseA" cx="1060" cy="192" r="6" fill="#28D7FF"/>
  </g>

  <text x="72" y="120" fill="#B4D9FF" font-family="'JetBrains Mono', Menlo, monospace" font-size="24" letter-spacing="2">SYSTEM SIGNAL MESH</text>
  <text x="72" y="188" fill="#F4FAFF" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-weight="800" font-size="68" letter-spacing="1.5">MUSHARAF KHAN PATHAN</text>
  <text x="72" y="236" fill="#D8EAFF" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="34" font-weight="600">Build. Secure. Ship.</text>
  <text x="72" y="282" fill="#8FB3D8" font-family="'JetBrains Mono', Menlo, monospace" font-size="22">Software Engineer | AI x Security x Backend Systems</text>

  <g>
    <rect x="72" y="306" width="214" height="40" rx="11" fill="#0A2340" stroke="#1D4A77"/>
    <text x="95" y="332" fill="#9EC6EF" font-family="'JetBrains Mono', Menlo, monospace" font-size="20">LATENCY OPTIMIZED</text>

    <rect x="302" y="306" width="180" height="40" rx="11" fill="#0A2340" stroke="#1D4A77"/>
    <text x="325" y="332" fill="#9EC6EF" font-family="'JetBrains Mono', Menlo, monospace" font-size="20">SECURITY FIRST</text>

    <rect x="496" y="306" width="204" height="40" rx="11" fill="#0A2340" stroke="#1D4A77"/>
    <text x="519" y="332" fill="#9EC6EF" font-family="'JetBrains Mono', Menlo, monospace" font-size="20">AUTOMATED DELIVERY</text>
  </g>

  <rect x="1.5" y="1.5" width="1197" height="377" rx="22.5" stroke="url(#heroGlow)" stroke-opacity="0.25" stroke-width="3"/>
</svg>
