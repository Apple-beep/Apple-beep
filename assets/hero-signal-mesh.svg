<svg width="1200" height="390" viewBox="0 0 1200 390" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="390" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#071427"/>
      <stop offset="0.55" stop-color="#0A2241"/>
      <stop offset="1" stop-color="#0A2C4D"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2CD7FF"/>
      <stop offset="0.5" stop-color="#5CF6CF"/>
      <stop offset="1" stop-color="#8B93FF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A1D38"/>
      <stop offset="1" stop-color="#0A2B49"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" stroke="#1C4B71" stroke-opacity="0.28" fill="none"/>
    </pattern>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="g"/>
      <feMerge>
        <feMergeNode in="g"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .pulse { animation: pulse 2.8s ease-in-out infinite; }
      .dash { stroke-dasharray: 7 10; animation: dash 11s linear infinite; }
      .scan { animation: scan 5.4s ease-in-out infinite; }
      @keyframes pulse {
        0%, 100% { opacity: 0.55; }
        50% { opacity: 1; }
      }
      @keyframes dash {
        to { stroke-dashoffset: -360; }
      }
      @keyframes scan {
        0% { transform: translateX(-70px); opacity: 0; }
        18% { opacity: 0.24; }
        82% { opacity: 0.24; }
        100% { transform: translateX(320px); opacity: 0; }
      }
    </style>
  </defs>

  <rect width="1200" height="390" rx="22" fill="url(#bg)"/>
  <rect width="1200" height="390" rx="22" fill="url(#grid)"/>
  <circle cx="250" cy="96" r="190" fill="#2CD7FF" opacity="0.1"/>
  <circle cx="1080" cy="280" r="170" fill="#5CF6CF" opacity="0.1"/>

  <text x="62" y="58" fill="#9DC4E6" font-family="'JetBrains Mono', Menlo, monospace" font-size="20" letter-spacing="1.6">SYSTEM://SIGNAL_MESH</text>
  <text x="62" y="124" fill="#EFF8FF" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="74" font-weight="800">MUSHARAF KHAN</text>
  <text x="62" y="194" fill="#EFF8FF" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="74" font-weight="800">PATHAN</text>
  <text x="62" y="242" fill="#D7EEFF" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="46" font-weight="700">Build. Secure. Scale.</text>
  <text x="62" y="278" fill="#98BFDF" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="24">Software Engineer | AI x Security | Backend Systems</text>

  <g transform="translate(62 304)">
    <rect x="0" y="0" width="188" height="42" rx="11" fill="#0C2D51" stroke="#2B6E9F"/>
    <text x="18" y="27" fill="#BCE1FF" font-family="'JetBrains Mono', Menlo, monospace" font-size="21">LOW LATENCY</text>

    <rect x="204" y="0" width="220" height="42" rx="11" fill="#0C2D51" stroke="#2B6E9F"/>
    <text x="222" y="27" fill="#BCE1FF" font-family="'JetBrains Mono', Menlo, monospace" font-size="21">SECURE BY DESIGN</text>

    <rect x="440" y="0" width="184" height="42" rx="11" fill="#0C2D51" stroke="#2B6E9F"/>
    <text x="458" y="27" fill="#BCE1FF" font-family="'JetBrains Mono', Menlo, monospace" font-size="21">SHIP FAST</text>
  </g>

  <g transform="translate(742 46)">
    <rect width="420" height="298" rx="18" fill="url(#panel)" stroke="#2A6A99"/>
    <text x="20" y="34" fill="#A3CAEB" font-family="'JetBrains Mono', Menlo, monospace" font-size="18">SIGNAL_BOARD://LIVE</text>
    <text x="20" y="58" fill="#7EA6C8" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="15">Execution + security + delivery profile</text>

    <g transform="translate(210 168)">
      <circle r="96" stroke="#245F8C" stroke-width="1.6"/>
      <circle r="64" stroke="#245F8C" stroke-width="1.4"/>
      <circle r="34" stroke="#245F8C" stroke-width="1.2"/>
      <circle r="6" fill="#5CF6CF" filter="url(#glow)"/>
      <path class="dash" d="M-108 -24C-68 -70 -20 -80 34 -56C78 -36 103 8 110 44" stroke="url(#line)" stroke-width="2.8" fill="none"/>
      <path class="dash" d="M-108 36C-74 10 -28 4 10 22C48 40 88 76 112 94" stroke="url(#line)" stroke-opacity="0.85" stroke-width="2.2" fill="none"/>
      <circle class="pulse" cx="-44" cy="-58" r="5" fill="#2CD7FF" filter="url(#glow)"/>
      <circle class="pulse" cx="74" cy="-8" r="5" fill="#5CF6CF" filter="url(#glow)"/>
      <circle class="pulse" cx="34" cy="72" r="5" fill="#8B93FF" filter="url(#glow)"/>
    </g>

    <rect class="scan" x="22" y="82" width="88" height="196" rx="10" fill="url(#line)" opacity="0.18"/>

    <g transform="translate(20 236)">
      <rect x="0" y="0" width="112" height="8" rx="4" fill="#163F65"/>
      <rect x="0" y="0" width="98" height="8" rx="4" fill="url(#line)"/>
      <text x="122" y="9" fill="#95BCDD" font-family="'JetBrains Mono', Menlo, monospace" font-size="12">EXECUTION 87%</text>

      <rect x="0" y="20" width="112" height="8" rx="4" fill="#163F65"/>
      <rect x="0" y="20" width="104" height="8" rx="4" fill="url(#line)"/>
      <text x="122" y="29" fill="#95BCDD" font-family="'JetBrains Mono', Menlo, monospace" font-size="12">SECURITY 92%</text>

      <rect x="0" y="40" width="112" height="8" rx="4" fill="#163F65"/>
      <rect x="0" y="40" width="94" height="8" rx="4" fill="url(#line)"/>
      <text x="122" y="49" fill="#95BCDD" font-family="'JetBrains Mono', Menlo, monospace" font-size="12">DELIVERY 84%</text>
    </g>
  </g>

  <rect x="1.5" y="1.5" width="1197" height="387" rx="20.5" stroke="#2FAFE9" stroke-opacity="0.3" stroke-width="3"/>
</svg>
