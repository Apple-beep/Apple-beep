<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="snapBg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#061227"/>
      <stop offset="1" stop-color="#04172F"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#40F6BF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#40F6BF" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#40F6BF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="barA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2AD7FF"/>
      <stop offset="1" stop-color="#68FADE"/>
    </linearGradient>
    <filter id="softGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="4" result="g"/>
      <feMerge>
        <feMergeNode in="g"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .sweep { animation: sweep 4.8s linear infinite; }
      .blink { animation: blink 1.3s steps(2, end) infinite; }
      .meter1 { animation: meter1 2.4s ease-in-out infinite; }
      .meter2 { animation: meter2 2.8s ease-in-out infinite; }
      .meter3 { animation: meter3 2.1s ease-in-out infinite; }
      .meter4 { animation: meter4 3.1s ease-in-out infinite; }
      @keyframes sweep {
        from { transform: translateY(0px); }
        to { transform: translateY(320px); }
      }
      @keyframes blink {
        0%,45% { opacity: 1; }
        46%,100% { opacity: 0.35; }
      }
      @keyframes meter1 { 0%,100% { width: 178px; } 50% { width: 214px; } }
      @keyframes meter2 { 0%,100% { width: 182px; } 50% { width: 236px; } }
      @keyframes meter3 { 0%,100% { width: 166px; } 50% { width: 206px; } }
      @keyframes meter4 { 0%,100% { width: 196px; } 50% { width: 240px; } }
    </style>
  </defs>

  <rect width="1200" height="420" rx="22" fill="url(#snapBg)"/>

  <rect x="42" y="44" width="744" height="332" rx="16" fill="#0A1A31" stroke="#1C3E66"/>
  <text x="70" y="84" fill="#A8D0F5" font-family="'JetBrains Mono', Menlo, monospace" font-size="24">RECRUITER://QUICK_SCAN</text>
  <text class="blink" x="378" y="84" fill="#40F6BF" font-family="'JetBrains Mono', Menlo, monospace" font-size="24">_</text>

  <text x="70" y="134" fill="#77F9BF" font-family="'JetBrains Mono', Menlo, monospace" font-size="34">candidate:</text>
  <text x="286" y="134" fill="#DCEEFF" font-family="'JetBrains Mono', Menlo, monospace" font-size="34">Musharaf Khan Pathan</text>

  <text x="70" y="178" fill="#77F9BF" font-family="'JetBrains Mono', Menlo, monospace" font-size="34">location:</text>
  <text x="242" y="178" fill="#DCEEFF" font-family="'JetBrains Mono', Menlo, monospace" font-size="34">Chicago, IL</text>

  <text x="70" y="222" fill="#77F9BF" font-family="'JetBrains Mono', Menlo, monospace" font-size="34">education:</text>
  <text x="278" y="222" fill="#DCEEFF" font-family="'JetBrains Mono', Menlo, monospace" font-size="34">IIT (BS CS, May 2026)</text>

  <text x="70" y="266" fill="#77F9BF" font-family="'JetBrains Mono', Menlo, monospace" font-size="34">target:</text>
  <text x="216" y="266" fill="#DCEEFF" font-family="'JetBrains Mono', Menlo, monospace" font-size="34">Full-Time SWE 2026</text>

  <text x="70" y="310" fill="#77F9BF" font-family="'JetBrains Mono', Menlo, monospace" font-size="34">core:</text>
  <text x="178" y="310" fill="#DCEEFF" font-family="'JetBrains Mono', Menlo, monospace" font-size="34">Secure AI + Scalable Backend</text>

  <g clip-path="url(#clip)">
    <rect class="sweep" x="42" y="44" width="744" height="42" fill="url(#scan)"/>
  </g>

  <g transform="translate(828 44)">
    <rect width="330" height="332" rx="16" fill="#08172C" stroke="#1C3E66"/>
    <text x="24" y="48" fill="#A8D0F5" font-family="'JetBrains Mono', Menlo, monospace" font-size="24">SIGNAL://PROOF</text>

    <text x="24" y="94" fill="#DCEEFF" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="24">Execution</text>
    <rect x="24" y="106" width="246" height="12" rx="6" fill="#0F2B48"/>
    <rect class="meter1" x="24" y="106" width="214" height="12" rx="6" fill="url(#barA)"/>

    <text x="24" y="156" fill="#DCEEFF" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="24">Security Mindset</text>
    <rect x="24" y="168" width="246" height="12" rx="6" fill="#0F2B48"/>
    <rect class="meter2" x="24" y="168" width="236" height="12" rx="6" fill="url(#barA)"/>

    <text x="24" y="218" fill="#DCEEFF" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="24">AI Product Delivery</text>
    <rect x="24" y="230" width="246" height="12" rx="6" fill="#0F2B48"/>
    <rect class="meter3" x="24" y="230" width="206" height="12" rx="6" fill="url(#barA)"/>

    <text x="24" y="280" fill="#DCEEFF" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="24">Scale + Reliability</text>
    <rect x="24" y="292" width="246" height="12" rx="6" fill="#0F2B48"/>
    <rect class="meter4" x="24" y="292" width="240" height="12" rx="6" fill="url(#barA)"/>

    <circle cx="288" cy="48" r="6" fill="#40F6BF" filter="url(#softGlow)"/>
  </g>

  <defs>
    <clipPath id="clip">
      <rect x="42" y="44" width="744" height="332" rx="16"/>
    </clipPath>
  </defs>
</svg>
