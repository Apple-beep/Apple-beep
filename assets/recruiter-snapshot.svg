      <text x="16" y="189" fill="#70F5C1" font-family="'JetBrains Mono', Menlo, monospace" font-size="19">target</text>
      <text x="180" y="189" fill="#EAF6FF" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="22">Full-Time SWE Roles (2026)</text>

