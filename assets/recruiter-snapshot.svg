<svg width="1200" height="430" viewBox="0 0 1200 430" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#071427"/>
      <stop offset="1" stop-color="#0A294A"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2CD7FF"/>
      <stop offset="0.5" stop-color="#5CF6CF"/>
      <stop offset="1" stop-color="#8B93FF"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5CF6CF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#5CF6CF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#5CF6CF" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="g"/>
      <feMerge>
        <feMergeNode in="g"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="430" rx="20" fill="url(#bg)"/>

  <g transform="translate(36 60)">
