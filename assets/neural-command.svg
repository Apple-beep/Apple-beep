<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-label="Animated engineering signal mesh">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#04070d"/>
      <stop offset="55%" stop-color="#081224"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.2"/>
      <stop offset="45%" stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0.45"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="pulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.95"/>
      <stop offset="70%" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <path id="routeA" d="M110 220 C230 110, 350 285, 470 170 S710 70, 820 180 S1000 250, 1110 140"/>
    <path id="routeB" d="M100 120 C240 260, 380 95, 520 220 S760 310, 900 170 S1040 110, 1120 240"/>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)" rx="20"/>

  <g stroke="url(#line)" stroke-width="2" fill="none" opacity="0.85">
    <path d="M110 220 C230 110, 350 285, 470 170 S710 70, 820 180 S1000 250, 1110 140"/>
    <path d="M100 120 C240 260, 380 95, 520 220 S760 310, 900 170 S1040 110, 1120 240" opacity="0.7"/>
    <path d="M90 300 C250 190, 420 330, 590 220 S900 70, 1110 280" opacity="0.35"/>
  </g>

  <g fill="url(#pulse)" filter="url(#glow)">
    <circle cx="110" cy="220" r="18">
      <animate attributeName="r" values="10;18;10" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="470" cy="170" r="15">
      <animate attributeName="r" values="8;15;8" dur="2s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
    <circle cx="820" cy="180" r="18">
      <animate attributeName="r" values="11;18;11" dur="2.5s" repeatCount="indefinite" begin="0.2s"/>
    </circle>
    <circle cx="1110" cy="140" r="16">
      <animate attributeName="r" values="10;16;10" dur="2.2s" repeatCount="indefinite" begin="1s"/>
    </circle>
  </g>

  <g filter="url(#glow)">
    <circle r="6" fill="#22d3ee">
      <animateMotion dur="4.5s" repeatCount="indefinite" rotate="auto">
        <mpath href="#routeA"/>
      </animateMotion>
    </circle>
    <circle r="5" fill="#fb923c">
      <animateMotion dur="5.5s" repeatCount="indefinite" rotate="auto" begin="1.2s">
        <mpath href="#routeB"/>
      </animateMotion>
    </circle>
    <circle r="4" fill="#a78bfa">
      <animateMotion dur="3.8s" repeatCount="indefinite" rotate="auto" begin="0.7s">
        <mpath href="#routeA"/>
      </animateMotion>
    </circle>
  </g>

  <g font-family="'JetBrains Mono', 'Fira Code', monospace" fill="#e2e8f0">
    <text x="66" y="72" font-size="18" fill="#67e8f9">SYSTEM SIGNAL MESH</text>
    <text x="66" y="110" font-size="38" font-weight="700">BUILD. SECURE. SHIP.</text>
    <text x="66" y="146" font-size="17" fill="#94a3b8">AI + security + backend reliability under real production constraints</text>
  </g>

  <g font-family="'JetBrains Mono', monospace" font-size="13" fill="#cbd5e1" opacity="0.95">
    <rect x="66" y="200" width="174" height="40" rx="9" fill="#0f172a" stroke="#1f334e"/>
    <text x="84" y="224">LATENCY OPTIMIZED</text>

    <rect x="252" y="200" width="164" height="40" rx="9" fill="#0f172a" stroke="#21404a"/>
    <text x="270" y="224">SECURITY FIRST</text>

    <rect x="428" y="200" width="190" height="40" rx="9" fill="#0f172a" stroke="#3c2f57"/>
    <text x="446" y="224">AUTOMATED DELIVERY</text>
  </g>
</svg>
