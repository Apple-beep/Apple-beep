    <text x="40" y="240" fill="#F0F9FF" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="56" font-weight="800">100+ Students Mentored</text>
    <text x="40" y="268" fill="#9CC2E6" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="22">Systems programming and Java OOP coaching</text>
