      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="430" rx="20" fill="url(#bg)"/>

  <text x="40" y="44" fill="#D8ECFF" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="44" font-weight="700">IMPACT://HIGH_SIGNAL</text>
  <line x1="40" y1="58" x2="1160" y2="58" stroke="#255A88" stroke-opacity="0.7"/>

