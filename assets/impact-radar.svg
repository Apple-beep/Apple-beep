<svg width="1200" height="430" viewBox="0 0 1200 430" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="impactBg" x1="0" y1="0" x2="1200" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#071026"/>
      <stop offset="1" stop-color="#051A33"/>
    </linearGradient>
    <radialGradient id="sweep" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(240 214) rotate(90) scale(170)">
      <stop offset="0" stop-color="#46F6C7" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#46F6C7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="360" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B2444"/>
      <stop offset="1" stop-color="#10315A"/>
    </linearGradient>
    <filter id="radGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="g"/>
      <feMerge>
        <feMergeNode in="g"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .ringDot { animation: ping 2.6s ease-out infinite; transform-origin: center; }
      .ringDot2 { animation: ping 3.1s ease-out infinite; transform-origin: center; }
      .ringDot3 { animation: ping 2.2s ease-out infinite; transform-origin: center; }
      .cardA { animation: cardA 2.6s ease-in-out infinite; }
      .cardB { animation: cardB 2.9s ease-in-out infinite; }
      .cardC { animation: cardC 2.3s ease-in-out infinite; }
      @keyframes ping {
        0%,100% { opacity: 0.6; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.23); }
      }
      @keyframes cardA { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
      @keyframes cardB { 0%,100% { transform: translateY(-2px); } 50% { transform: translateY(2px); } }
      @keyframes cardC { 0%,100% { transform: translateY(1px); } 50% { transform: translateY(-3px); } }
    </style>
  </defs>

  <rect width="1200" height="430" rx="22" fill="url(#impactBg)"/>

  <g transform="translate(60 44)">
    <rect width="360" height="342" rx="16" fill="#08172F" stroke="#1C3F68"/>
    <circle cx="180" cy="170" r="132" stroke="#1B5E8D" stroke-width="2"/>
    <circle cx="180" cy="170" r="99" stroke="#1B5E8D" stroke-width="1.5"/>
    <circle cx="180" cy="170" r="66" stroke="#1B5E8D" stroke-width="1.2"/>
    <circle cx="180" cy="170" r="33" stroke="#1B5E8D" stroke-width="1"/>
    <path d="M180 32V308M48 170H312" stroke="#1B5E8D" stroke-width="1"/>

    <path d="M180 170L300 95A132 132 0 0 1 252 278Z" fill="url(#sweep)">
      <animateTransform attributeName="transform" type="rotate" from="0 180 170" to="360 180 170" dur="6s" repeatCount="indefinite"/>
    </path>

    <circle class="ringDot" cx="252" cy="120" r="6" fill="#2AD7FF" filter="url(#radGlow)"/>
    <circle class="ringDot2" cx="225" cy="214" r="6" fill="#70FFDD" filter="url(#radGlow)"/>
    <circle class="ringDot3" cx="128" cy="225" r="6" fill="#9E8FFF" filter="url(#radGlow)"/>

    <text x="28" y="42" fill="#A5D2F7" font-family="'JetBrains Mono', Menlo, monospace" font-size="22">IMPACT://RADAR_SCAN</text>
  </g>

  <g transform="translate(456 54)">
    <rect width="688" height="322" rx="16" fill="#08172E" stroke="#1C3F68"/>

    <g class="cardA" transform="translate(26 28)">
      <rect width="304" height="118" rx="14" fill="url(#card)"/>
      <text x="18" y="36" fill="#9ED0F6" font-family="'JetBrains Mono', Menlo, monospace" font-size="18">DEPLOYMENT IMPACT</text>
      <text x="18" y="78" fill="#F2FAFF" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="46" font-weight="800">4h -> 15m</text>
      <text x="18" y="102" fill="#99BFE4" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="20">Release pipeline acceleration</text>
    </g>

    <g class="cardB" transform="translate(358 28)">
      <rect width="304" height="118" rx="14" fill="url(#card)"/>
      <text x="18" y="36" fill="#9ED0F6" font-family="'JetBrains Mono', Menlo, monospace" font-size="18">SECURITY IMPACT</text>
      <text x="18" y="78" fill="#F2FAFF" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="46" font-weight="800">92% / -84%</text>
      <text x="18" y="102" fill="#99BFE4" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="20">Detection and risky-click reduction</text>
    </g>

    <g class="cardC" transform="translate(26 176)">
      <rect width="636" height="118" rx="14" fill="url(#card)"/>
      <text x="18" y="36" fill="#9ED0F6" font-family="'JetBrains Mono', Menlo, monospace" font-size="18">LEADERSHIP SIGNAL</text>
      <text x="18" y="78" fill="#F2FAFF" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="46" font-weight="800">100+ Students Mentored</text>
      <text x="18" y="102" fill="#99BFE4" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="20">Systems programming and Java OOP coaching</text>
    </g>
  </g>
</svg>
