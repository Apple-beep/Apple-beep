    <text x="40" y="124" fill="#9CC2E6" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="22">Release workflow acceleration</text>

    <rect x="368" y="22" width="324" height="124" rx="14" fill="url(#card)"/>
