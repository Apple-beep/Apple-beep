<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 270" role="img" aria-label="Animated impact radar">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060b14"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="70%" stop-color="#22d3ee" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="270" rx="18" fill="url(#panel)"/>

  <g transform="translate(170 135)" stroke="#21435c" fill="none">
    <circle r="96"/>
    <circle r="72"/>
    <circle r="48"/>
    <circle r="24"/>
    <line x1="-100" y1="0" x2="100" y2="0"/>
    <line x1="0" y1="-100" x2="0" y2="100"/>

    <g filter="url(#softGlow)">
      <path d="M0 0 L96 0" stroke="url(#sweep)" stroke-width="5">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
      </path>
      <circle cx="62" cy="-40" r="4" fill="#67e8f9">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="2.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-24" cy="58" r="4" fill="#fb923c">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" repeatCount="indefinite" begin="0.8s"/>
      </circle>
      <circle cx="42" cy="30" r="3.5" fill="#a78bfa">
        <animate attributeName="opacity" values="0.15;1;0.15" dur="1.8s" repeatCount="indefinite" begin="0.4s"/>
      </circle>
    </g>
  </g>

  <g font-family="'JetBrains Mono', monospace" fill="#e2e8f0">
    <text x="360" y="68" font-size="16" fill="#67e8f9">IMPACT RADAR</text>
    <text x="360" y="102" font-size="34" font-weight="700">High-Signal Results</text>

    <g font-size="18">
      <text x="360" y="150">- Deployment time: 4h to 15m</text>
      <text x="360" y="180">- Phishing defense: 92% detection</text>
      <text x="360" y="210">- Student mentorship: 100+ learners</text>
    </g>

    <g font-size="14" fill="#94a3b8">
      <text x="360" y="238">Signal mix: reliability, security, AI product delivery</text>
    </g>
  </g>
</svg>
