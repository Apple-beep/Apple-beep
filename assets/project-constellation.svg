<svg width="1200" height="430" viewBox="0 0 1200 430" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050F22"/>
      <stop offset="1" stop-color="#07203E"/>
    </linearGradient>
    <linearGradient id="wire" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2CD8FF"/>
      <stop offset="0.5" stop-color="#68F7D8"/>
      <stop offset="1" stop-color="#8A93FF"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="g"/>
      <feMerge>
        <feMergeNode in="g"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .wire { stroke-dasharray: 8 10; animation: wire 13s linear infinite; }
      .n1 { animation: n1 2.4s ease-in-out infinite; transform-origin: center; }
      .n2 { animation: n2 2.9s ease-in-out infinite; transform-origin: center; }
      .n3 { animation: n3 2.2s ease-in-out infinite; transform-origin: center; }
      .n4 { animation: n4 2.6s ease-in-out infinite; transform-origin: center; }
      .n5 { animation: n5 3.1s ease-in-out infinite; transform-origin: center; }
      .orbit { animation: orbit 14s linear infinite; transform-origin: center; }
      @keyframes wire {
        to { stroke-dashoffset: -320; }
      }
      @keyframes n1 {
        0%,100% { opacity: 0.7; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.25); }
      }
      @keyframes n2 {
        0%,100% { opacity: 0.65; transform: scale(0.92); }
        50% { opacity: 1; transform: scale(1.2); }
      }
      @keyframes n3 {
        0%,100% { opacity: 0.68; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.22); }
      }
      @keyframes n4 {
        0%,100% { opacity: 0.64; transform: scale(0.95); }
        50% { opacity: 1; transform: scale(1.18); }
      }
      @keyframes n5 {
        0%,100% { opacity: 0.66; transform: scale(0.9); }
        50% { opacity: 1; transform: scale(1.2); }
      }
      @keyframes orbit {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
    </style>
  </defs>

  <rect width="1200" height="430" rx="22" fill="url(#bg)"/>

  <g transform="translate(42 38)">
    <rect width="1116" height="354" rx="16" fill="#081831" stroke="#1D3E67"/>

    <text x="24" y="44" fill="#A8D0F5" font-family="'JetBrains Mono', Menlo, monospace" font-size="22">PROJECTS://CONSTELLATION_MAP</text>
    <text x="24" y="74" fill="#88AFD2" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="18">Each node represents a shipped project signal with product, security, and execution weight.</text>

    <path class="wire" d="M102 248C170 228 236 194 316 194C382 194 442 238 516 238C610 238 662 154 748 154C834 154 888 244 978 244C1010 244 1032 236 1052 226" stroke="url(#wire)" stroke-width="3" fill="none"/>
    <path class="wire" d="M102 248C172 280 242 312 312 312C390 312 454 276 528 276C602 276 664 322 742 322C808 322 884 284 952 236" stroke="url(#wire)" stroke-opacity="0.7" stroke-width="2.2" fill="none"/>

    <g filter="url(#glow)">
      <circle class="n1" cx="102" cy="248" r="10" fill="#2CD8FF"/>
      <circle class="n2" cx="316" cy="194" r="11" fill="#68F7D8"/>
      <circle class="n3" cx="516" cy="238" r="11" fill="#8A93FF"/>
      <circle class="n4" cx="748" cy="154" r="12" fill="#68F7D8"/>
      <circle class="n5" cx="952" cy="236" r="12" fill="#2CD8FF"/>
    </g>

    <g>
      <text x="54" y="286" fill="#CDE7FF" font-family="'JetBrains Mono', Menlo, monospace" font-size="17">CHECKURL EXT</text>
      <text x="256" y="178" fill="#CDE7FF" font-family="'JetBrains Mono', Menlo, monospace" font-size="17">HIRELENS</text>
      <text x="464" y="222" fill="#CDE7FF" font-family="'JetBrains Mono', Menlo, monospace" font-size="17">AI PATHFINDING</text>
      <text x="680" y="138" fill="#CDE7FF" font-family="'JetBrains Mono', Menlo, monospace" font-size="17">VISIONVOICE</text>
      <text x="888" y="220" fill="#CDE7FF" font-family="'JetBrains Mono', Menlo, monospace" font-size="17">F1 DBMS</text>
    </g>

    <g transform="translate(852 50)">
      <rect width="232" height="126" rx="14" fill="#0C2445" stroke="#2A567F"/>
      <text x="18" y="30" fill="#9DD0F6" font-family="'JetBrains Mono', Menlo, monospace" font-size="18">MISSION LEGEND</text>
      <circle cx="24" cy="56" r="6" fill="#2CD8FF"/>
      <text x="40" y="61" fill="#DDEEFF" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="16">Security + product reliability</text>
      <circle cx="24" cy="84" r="6" fill="#68F7D8"/>
      <text x="40" y="89" fill="#DDEEFF" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="16">AI + backend delivery</text>
      <circle cx="24" cy="112" r="6" fill="#8A93FF"/>
      <text x="40" y="117" fill="#DDEEFF" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="16">Data and performance systems</text>
    </g>

    <g class="orbit" transform="translate(618 152)">
      <circle cx="0" cy="0" r="26" fill="none" stroke="#2CD8FF" stroke-opacity="0.45"/>
      <circle cx="0" cy="-26" r="4" fill="#68F7D8"/>
    </g>
  </g>
</svg>
