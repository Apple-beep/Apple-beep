<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#060F21"/>
      <stop offset="1" stop-color="#082546"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2DD8FF"/>
      <stop offset="0.6" stop-color="#66F8D9"/>
      <stop offset="1" stop-color="#8494FF"/>
    </linearGradient>
    <style>
      .pulse { animation: pulse 2.8s ease-in-out infinite; transform-origin: center; }
      .scan { animation: scan 5.5s linear infinite; }
      @keyframes pulse {
        0%,100% { opacity: 0.65; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.2); }
      }
      @keyframes scan {
        from { transform: translateX(-140px); }
        to { transform: translateX(1240px); }
      }
    </style>
  </defs>

  <rect width="1200" height="360" rx="18" fill="url(#bg)"/>
  <path d="M40 284H1160" stroke="#123357" stroke-width="2"/>

  <g fill="#0F2E50" stroke="#1F4D79">
    <rect x="80" y="210" width="38" height="74"/>
    <rect x="132" y="186" width="44" height="98"/>
    <rect x="188" y="170" width="32" height="114"/>
