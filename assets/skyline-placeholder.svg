    <rect x="332" y="156" width="30" height="128"/>
    <rect x="374" y="174" width="36" height="110"/>
    <rect x="422" y="132" width="50" height="152"/>
    <rect x="490" y="212" width="22" height="72"/>
    <rect x="524" y="182" width="34" height="102"/>
    <rect x="572" y="162" width="40" height="122"/>
    <rect x="626" y="196" width="26" height="88"/>
    <rect x="666" y="224" width="30" height="60"/>
    <rect x="710" y="170" width="48" height="114"/>
    <rect x="774" y="148" width="36" height="136"/>
    <rect x="824" y="190" width="28" height="94"/>
    <rect x="864" y="204" width="40" height="80"/>
    <rect x="918" y="166" width="34" height="118"/>
    <rect x="966" y="192" width="28" height="92"/>
    <rect x="1008" y="214" width="44" height="70"/>
  </g>

  <rect class="scan" x="-140" y="100" width="120" height="170" rx="8" fill="url(#line)" opacity="0.22"/>

  <circle class="pulse" cx="422" cy="132" r="6" fill="#2DD8FF"/>
  <circle class="pulse" cx="774" cy="148" r="6" fill="#66F8D9"/>
  <circle class="pulse" cx="918" cy="166" r="6" fill="#8494FF"/>

  <text x="42" y="52" fill="#A8D3F7" font-family="'JetBrains Mono', Menlo, monospace" font-size="24">SKYLINE://LIVE_COMMIT_CITY</text>
  <text x="42" y="84" fill="#88B0D4" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="18">Initial skyline placeholder loaded. Workflow will replace this with real live 3D commit city.</text>
