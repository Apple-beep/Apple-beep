<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" role="img" aria-label="Musharaf command deck hero">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#04070f"/>
      <stop offset="45%" stop-color="#0c1430"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="45%" stop-color="#22d3ee" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <filter id="g">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="360" rx="20" fill="url(#bg)"/>

  <g opacity="0.16" stroke="#22d3ee" stroke-width="1">
    <path d="M0 76 H1280"/>
    <path d="M0 110 H1280"/>
    <path d="M0 144 H1280"/>
    <path d="M0 178 H1280"/>
    <path d="M0 212 H1280"/>
    <path d="M0 246 H1280"/>
    <path d="M0 280 H1280"/>
  </g>

  <g opacity="0.16" stroke="#60a5fa" stroke-width="1">
    <path d="M120 0 V360"/>
    <path d="M220 0 V360"/>
    <path d="M320 0 V360"/>
    <path d="M420 0 V360"/>
    <path d="M520 0 V360"/>
    <path d="M620 0 V360"/>
    <path d="M720 0 V360"/>
    <path d="M820 0 V360"/>
    <path d="M920 0 V360"/>
    <path d="M1020 0 V360"/>
    <path d="M1120 0 V360"/>
  </g>

  <rect x="-340" y="0" width="340" height="360" fill="url(#beam)">
    <animate attributeName="x" values="-340;1280" dur="5.8s" repeatCount="indefinite"/>
  </rect>

  <g filter="url(#g)">
    <circle cx="1030" cy="92" r="56" fill="none" stroke="#22d3ee" stroke-opacity="0.45"/>
    <circle cx="1030" cy="92" r="36" fill="none" stroke="#67e8f9" stroke-opacity="0.65"/>
    <circle cx="1030" cy="92" r="7" fill="#67e8f9">
      <animate attributeName="r" values="5;9;5" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g fill="#e2e8f0" font-family="'JetBrains Mono', monospace">
    <text x="80" y="85" font-size="16" fill="#67e8f9">PROFILE MODE :: VIBE COMMAND DECK</text>
    <text x="80" y="148" font-size="58" font-weight="700">MUSHARAF KHAN PATHAN</text>
    <text x="80" y="193" font-size="28" fill="#cbd5e1">Software Engineer • AI • Security • Backend</text>
    <text x="80" y="238" font-size="19" fill="#94a3b8">Building high-trust systems that ship under production pressure</text>
  </g>

  <g font-family="'JetBrains Mono', monospace" font-size="14" fill="#dbeafe" opacity="0.95">
    <rect x="80" y="268" width="200" height="36" rx="9" fill="#0b1224" stroke="#1d3350"/>
    <text x="98" y="291">PORTFOLIO-FIRST</text>

    <rect x="292" y="268" width="210" height="36" rx="9" fill="#0b1224" stroke="#1d3f43"/>
    <text x="310" y="291">RECRUITER-READY</text>

    <rect x="514" y="268" width="238" height="36" rx="9" fill="#0b1224" stroke="#3f2f53"/>
    <text x="532" y="291">LIVE CONTRIBUTION ART</text>
  </g>
</svg>
