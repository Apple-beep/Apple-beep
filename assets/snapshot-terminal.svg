<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 230" role="img" aria-label="Recruiter snapshot terminal">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050a14"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="typing">
      <rect x="78" y="116" width="0" height="30">
        <animate attributeName="width" values="0;1100;0" dur="7s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <rect width="1280" height="230" rx="16" fill="url(#bg)"/>

  <rect x="40" y="36" width="1200" height="160" rx="12" fill="#0b1324" stroke="#203049"/>

  <circle cx="70" cy="62" r="7" fill="#f87171"/>
  <circle cx="92" cy="62" r="7" fill="#fbbf24"/>
  <circle cx="114" cy="62" r="7" fill="#34d399"/>
  <text x="138" y="67" font-family="'JetBrains Mono', monospace" font-size="14" fill="#93c5fd">recruiter_snapshot.sh</text>

  <g font-family="'JetBrains Mono', monospace" font-size="30" fill="#e2e8f0" filter="url(#glow)">
    <text x="76" y="106">$ whois musharaf</text>
  </g>

  <g font-family="'JetBrains Mono', monospace" font-size="28" fill="#67e8f9" clip-path="url(#typing)">
    <text x="78" y="140">Software engineer focused on AI security and scalable backend delivery.</text>
  </g>

  <g font-family="'JetBrains Mono', monospace" font-size="18" fill="#94a3b8">
    <text x="78" y="171">Chicago, IL  •  Illinois Tech (May 2026)  •  F-1 OPT Ready</text>
  </g>
</svg>
