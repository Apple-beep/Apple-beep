  <text x="50" y="21" font-family="'Courier New', monospace" font-size="11" font-weight="700" fill="#f59e0b" letter-spacing="1.5">DIRECT CONTACT</text>
  <text x="50" y="36" font-family="'Courier New', monospace" font-size="9" fill="rgba(148,163,184,0.55)" letter-spacing="0.5">mpathan2work@gmail.com</text>

