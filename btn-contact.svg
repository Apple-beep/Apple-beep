      <stop offset="0%" style="stop-color:#1a1000"/>
      <stop offset="100%" style="stop-color:#261600"/>
    </linearGradient>
  </defs>

  <rect width="280" height="52" rx="10" fill="url(#bg-ct)"/>
  <rect x="0.75" y="0.75" width="278.5" height="50.5" rx="9.5" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.6"/>
  <rect x="1" y="1" width="278" height="2" rx="9" fill="#f59e0b" opacity="0.15"/>
  <rect x="0.75" y="0.75" width="278.5" height="50.5" rx="9.5" fill="none" stroke="#f59e0b" stroke-width="1">
    <animate attributeName="stroke-opacity" values="0.3;0.9;0.3" dur="2.5s" begin="1.6s" repeatCount="indefinite"/>
  </rect>

