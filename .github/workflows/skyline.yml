name: 🌆 3D Contribution Skyline

on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/skyline.yml
      - README.md

permissions:
  contents: write

concurrency:
  group: skyline-contrib
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate skyline SVGs
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: Apple-beep

      - name: Commit generated skyline assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A profile-3d-contrib
          if git diff --cached --quiet; then
            echo "No skyline updates"
            exit 0
          fi
          git commit -m "chore: refresh 3D contribution skyline"
          git push
