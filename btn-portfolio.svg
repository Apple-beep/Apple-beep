<svg width="280" height="52" viewBox="0 0 280 52" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-p" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001a14"/>
      <stop offset="100%" style="stop-color:#002a1e"/>
    </linearGradient>
    <filter id="gp" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="280" height="52" rx="10" fill="url(#bg-p)"/>
  <rect x="0.75" y="0.75" width="278.5" height="50.5" rx="9.5" fill="none" stroke="#00f5d4" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Top edge glow -->
  <rect x="1" y="1" width="278" height="2" rx="9" fill="#00f5d4" opacity="0.15"/>

  <!-- Animated border pulse -->
  <rect x="0.75" y="0.75" width="278.5" height="50.5" rx="9.5" fill="none" stroke="#00f5d4" stroke-width="1">
    <animate attributeName="stroke-opacity" values="0.3;0.9;0.3" dur="2.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Icon area -->
  <rect x="14" y="14" width="24" height="24" rx="6" fill="rgba(0,245,212,0.1)" stroke="#00f5d4" stroke-width="1" stroke-opacity="0.4"/>
  <text x="26" y="30" font-size="12" text-anchor="middle" dominant-baseline="middle">🌐</text>

  <!-- Label -->
  <text x="50" y="21" font-family="'Courier New', monospace" font-size="11" font-weight="700" fill="#00f5d4" letter-spacing="1.5">PORTFOLIO</text>
  <text x="50" y="36" font-family="'Courier New', monospace" font-size="9" fill="rgba(148,163,184,0.55)" letter-spacing="0.5">musharafportfolio.vercel.app</text>

  <!-- Arrow -->
  <text x="254" y="29" font-family="'Courier New', monospace" font-size="14" fill="#00f5d4" opacity="0.6" text-anchor="middle" dominant-baseline="middle">→</text>

  <!-- Shimmer sweep -->
  <rect x="0" y="0" width="60" height="52" rx="10" fill="rgba(0,245,212,0.04)">
    <animateTransform attributeName="transform" type="translate" values="-60,0;340,0;-60,0" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>
