  </defs>

  <rect width="280" height="52" rx="10" fill="url(#bg-li)"/>
  <rect x="0.75" y="0.75" width="278.5" height="50.5" rx="9.5" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-opacity="0.6"/>
  <rect x="1" y="1" width="278" height="2" rx="9" fill="#a855f7" opacity="0.15"/>
  <rect x="0.75" y="0.75" width="278.5" height="50.5" rx="9.5" fill="none" stroke="#a855f7" stroke-width="1">
    <animate attributeName="stroke-opacity" values="0.3;0.9;0.3" dur="2.5s" begin="0.8s" repeatCount="indefinite"/>
